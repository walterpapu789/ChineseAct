<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard corporativo moderno para la gestión de proyectos y análisis de datos.">
    <title>Panel de Control | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="dashboard-layout">
    
    <header class="topbar">
        <h1>Dashboard System</h1>
        <div class="user-profile">
            <span>Admin</span>
        </div>
    </header>

    <nav class="sidebar">
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Inventario</a></li>
            <li><a href="#">Reportes</a></li>
            <li><a href="#">Configuración</a></li>
        </ul>
    </nav>

    <main class="content">
        <div class="card">
            <h3>Usuarios Activos</h3>
            <p>1,245</p>
        </div>
        <div class="card">
            <h3>Ventas Diarias</h3>
            <p>$3,400</p>
        </div>
        <div class="card">
            <h3>Errores de Sistema</h3>
            <p>12</p>
        </div>
        <div class="card card-wide">
            <h3>Actividad del Servidor</h3>
            <p class="grafico-placeholder">Gráfico de monitoreo aquí</p>
        </div>
    </main>

</div>

</body>
</html>
