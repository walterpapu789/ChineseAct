<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 5 - Flexbox vs Grid</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>1. Flexbox (Unidimensional - Se adapta al contenido)</h2>
    <div class="flex-container">
        <div class="box">Texto Corto</div>
        <div class="box">Texto Mucho Más Largo Que El Resto</div>
        <div class="box">Texto</div>
    </div>

    <h2>2. Grid (Bidimensional - Impone la estructura)</h2>
    <div class="grid-container">
        <div class="box">Texto Corto</div>
        <div class="box">Texto Mucho Más Largo Que El Resto</div>
        <div class="box">Texto</div>
    </div>
</body>
</html>
