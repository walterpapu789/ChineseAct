<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de incluir archivos  css</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
         h1,h2 {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Formas de incluir archivos CSS</h1>
    <h2>Enlace externo</h2>
    <p>La forma más común de incluir CSS es mediante un enlace externo. Esto se hace utilizando la etiqueta <code>&lt;link&gt;</code> en el encabezado del documento HTML. El atributo <code>href</code> especifica la ubicación del archivo CSS.</p>
    
</body>
</html>
